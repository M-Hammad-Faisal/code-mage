name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint + Type Check ─────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npm run type-check

  # ── 2. Build ─────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality

    env:
      # Dummy Supabase env vars — keeps build from failing in CI
      # Real values live in Vercel environment variables
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder
      SUPABASE_SECRET_KEY: sb_secret_placeholder
      NEXT_PUBLIC_SITE_URL: https://code-mage.vercel.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.sha }}
          path: .next/
          retention-days: 7

  # ── 3. Security Audit ────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        # audit-level=high: only fail on high/critical severity
        # The @lhci/cli → inquirer → external-editor → tmp chain has a moderate
        # symlink vulnerability (GHSA-52f5-9888-hmc6). The `tmp` package (<=0.2.3)
        # is abandoned with no patched version. Risk is negligible: dev-only CI tool,
        # not in the production bundle. Tracked in: https://github.com/raszi/node-tmp/issues
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for outdated packages
        run: npm outdated || true
